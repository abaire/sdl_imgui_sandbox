name: Build

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sandbox-windows
          path: build/Release/sandbox.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libx11-dev \
            libxext-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxv-dev \
            libxss-dev \
            libxtst-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            ninja-build

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sandbox-linux
          path: build/sandbox

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package .app
        run: |
          cd build
          # Check if it's in a subfolder (like Release) or not
          if [ -d "Release/sandbox.app" ]; then
            zip -r ../sandbox-mac.zip Release/sandbox.app
          else
            zip -r ../sandbox-mac.zip sandbox.app
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sandbox-macos
          path: sandbox-mac.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v7
        with:
          name: sandbox-windows
          path: artifacts/windows

      - name: Download Linux Artifact
        uses: actions/download-artifact@v7
        with:
          name: sandbox-linux
          path: artifacts/linux

      - name: Download macOS Artifact
        uses: actions/download-artifact@v7
        with:
          name: sandbox-macos
          path: artifacts/macos

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp artifacts/windows/sandbox.exe release-assets/sandbox-windows.exe
          cp artifacts/linux/sandbox release-assets/sandbox-linux
          cp artifacts/macos/sandbox-mac.zip release-assets/sandbox-macos.zip
          chmod +x release-assets/sandbox-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: |
            Automated build of the latest commit to main.
            
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            release-assets/sandbox-windows.exe
            release-assets/sandbox-linux
            release-assets/sandbox-macos.zip
          make_latest: true
