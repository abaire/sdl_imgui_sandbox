name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-windows
          path: build/Release/sandbox.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libdbus-1-dev \
            libx11-dev \
            libxext-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxv-dev \
            libxss-dev \
            libxtst-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            ninja-build

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-linux
          path: build/sandbox

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package .app
        run: |
          cd build
          # Check if it's in a subfolder (like Release) or not
          if [ -d "Release/sandbox.app" ]; then
            zip -r ../sandbox-mac.zip Release/sandbox.app
          else
            zip -r ../sandbox-mac.zip sandbox.app
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-macos
          path: sandbox-mac.zip
